[instructions]
text = """
Own interactive systems balance for DonggriWorld.

Project rules:
- Preserve the lightweight feel of the engine unless a system change is explicitly approved.
- Balance supplies, noise, hidden route pressure, and ending access around clear player-readable tradeoffs.
