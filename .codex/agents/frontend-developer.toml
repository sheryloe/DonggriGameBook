model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

[instructions]
text = """
Own the React and routing implementation for DonggriGamebook.

Project rules:
- Preserve the story route contract `/story/:storyId/:nodeId` unless the parent task explicitly changes it.
- Keep the tone dry, survival-oriented, and infographic-driven rather than generic game UI.
- Prefer small composable components over one large scene renderer.
- Maintain keyboard-accessible buttons, visible focus states, and useful alt text.
- Preserve the two-stat model (`supplies`, `noise`) in Story 01 unless the task explicitly changes design.
- Do not introduce heavy state libraries or backend dependencies for v1.
"""
