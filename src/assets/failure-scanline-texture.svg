<svg width="1800" height="1200" viewBox="0 0 1800 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Failure scanline texture</title>
  <desc id="desc">A dark glitch texture with scan lines, warning streaks, and distressed overlays for ending and failure states.</desc>
  <defs>
    <radialGradient id="vignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 600) rotate(90) scale(610 980)">
      <stop stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.84"/>
    </radialGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F05A2A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F05A2A" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#F05A2A" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1800" height="1200" fill="#050608"/>
  <g opacity="0.9">
    <path d="M0 120H1800" stroke="#1A2026" stroke-width="3"/>
    <path d="M0 180H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 240H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 300H1800" stroke="#1A2026" stroke-width="3"/>
    <path d="M0 360H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 420H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 480H1800" stroke="#1A2026" stroke-width="3"/>
    <path d="M0 540H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 600H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 660H1800" stroke="#1A2026" stroke-width="3"/>
    <path d="M0 720H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 780H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 840H1800" stroke="#1A2026" stroke-width="3"/>
    <path d="M0 900H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 960H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 1020H1800" stroke="#1A2026" stroke-width="3"/>
    <path d="M0 1080H1800" stroke="#1A2026" stroke-width="2"/>
    <path d="M0 1140H1800" stroke="#1A2026" stroke-width="2"/>
  </g>

  <g opacity="0.38">
    <path d="M120 240C310 206 468 202 624 226C820 256 942 262 1104 224C1258 188 1382 172 1680 214" stroke="#F05A2A" stroke-width="18" stroke-linecap="round"/>
    <path d="M-40 324C140 286 286 280 452 306C624 334 778 328 940 292C1110 254 1260 244 1820 302" stroke="#6FE1BB" stroke-opacity="0.25" stroke-width="10" stroke-linecap="round"/>
    <path d="M88 870C300 818 444 810 624 838C808 868 954 878 1110 844C1266 812 1432 804 1704 842" stroke="#F05A2A" stroke-width="14" stroke-linecap="round"/>
  </g>

  <g opacity="0.36">
    <circle cx="1330" cy="340" r="210" fill="#F05A2A" fill-opacity="0.08"/>
    <circle cx="440" cy="780" r="260" fill="#6FE1BB" fill-opacity="0.07"/>
    <circle cx="1460" cy="910" r="160" fill="#F05A2A" fill-opacity="0.09"/>
  </g>

  <rect width="1800" height="1200" fill="url(#vignette)"/>
  <rect width="1800" height="1200" fill="url(#streak)" opacity="0.16"/>
  <rect width="1800" height="1200" filter="url(#noise)" opacity="0.65"/>

  <g opacity="0.48">
    <path d="M0 72H1800" stroke="#F05A2A" stroke-width="6" stroke-opacity="0.35"/>
    <path d="M0 1068H1800" stroke="#F05A2A" stroke-width="6" stroke-opacity="0.28"/>
  </g>
</svg>
