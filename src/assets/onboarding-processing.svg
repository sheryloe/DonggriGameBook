<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Onboarding processing dossier</title>
  <desc id="desc">A Korean post-collapse registration screen with name card, thermal scan frame, queue markers, and administrative tape.</desc>
  <defs>
    <linearGradient id="bg" x1="800" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070B"/>
      <stop offset="0.56" stop-color="#0B0E13"/>
      <stop offset="1" stop-color="#030406"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(830 320) rotate(90) scale(360 560)">
      <stop stop-color="#F05A2A" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#F05A2A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#F05A2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="400" y1="170" x2="1200" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0D3B9"/>
      <stop offset="1" stop-color="#CBB894"/>
    </linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" stroke="#B9D2FF" stroke-opacity="0.06" stroke-width="1"/>
      <path d="M36 0V72M0 36H72" stroke="#B9D2FF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <g opacity="0.22">
    <path d="M0 780H1600" stroke="#D7E4FF" stroke-width="2"/>
    <path d="M160 150H1440" stroke="#D7E4FF" stroke-opacity="0.28" stroke-width="1.5"/>
    <path d="M220 860H1380" stroke="#D7E4FF" stroke-opacity="0.18" stroke-width="1.5"/>
  </g>

  <g transform="translate(250 130)">
    <rect x="0" y="0" width="1100" height="740" rx="22" fill="#0D1016" stroke="#293241" stroke-width="2"/>
    <rect x="36" y="34" width="1028" height="670" rx="18" fill="url(#paper)"/>

    <g opacity="0.55">
      <path d="M86 96H430" stroke="#6B5E46" stroke-width="3"/>
      <path d="M86 132H360" stroke="#6B5E46" stroke-width="3"/>
      <path d="M86 168H498" stroke="#6B5E46" stroke-width="3"/>
      <path d="M86 204H340" stroke="#6B5E46" stroke-width="3"/>
      <path d="M86 240H520" stroke="#6B5E46" stroke-width="3"/>
    </g>

    <g>
      <rect x="86" y="54" width="290" height="34" rx="3" fill="#8B0000" fill-opacity="0.9"/>
      <text x="106" y="78" fill="#F4D6CF" font-family="Space Grotesk, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">TEMP CODE / PROCESSING</text>
    </g>

    <g transform="translate(84 318)">
      <rect x="0" y="0" width="430" height="264" fill="#F0E3C9" stroke="#8C7B59" stroke-width="2"/>
      <rect x="24" y="24" width="382" height="176" rx="10" fill="#10151C" stroke="#F05A2A" stroke-width="3"/>
      <rect x="44" y="44" width="342" height="136" rx="6" fill="none" stroke="#F05A2A" stroke-width="2" stroke-dasharray="8 6"/>
      <path d="M232 44V180M44 112H386" stroke="#F05A2A" stroke-opacity="0.6" stroke-width="1.5"/>
      <circle cx="232" cy="112" r="48" fill="#F05A2A" fill-opacity="0.08" stroke="#F05A2A" stroke-width="2"/>
      <circle cx="232" cy="112" r="18" fill="#F05A2A" fill-opacity="0.34"/>
      <text x="58" y="216" fill="#5B4E39" font-family="Space Grotesk, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2">THERMAL SCAN / STAMP AREA</text>
      <rect x="318" y="206" width="88" height="28" rx="4" fill="#6F8F53"/>
      <text x="335" y="225" fill="#F2F6DF" font-family="Space Grotesk, Arial, sans-serif" font-size="13" font-weight="700">PASS</text>
    </g>

    <g transform="translate(560 308)">
      <rect x="0" y="0" width="418" height="268" rx="18" fill="#171A20" stroke="#F1E3C9" stroke-opacity="0.18" stroke-width="2"/>
      <rect x="24" y="24" width="370" height="46" rx="10" fill="#252A31"/>
      <text x="42" y="53" fill="#D8E5FF" font-family="Space Grotesk, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">NAME INPUT</text>
      <rect x="24" y="90" width="370" height="44" rx="8" fill="#0D1118" stroke="#B9D2FF" stroke-opacity="0.22"/>
      <rect x="24" y="146" width="220" height="44" rx="8" fill="#0D1118" stroke="#B9D2FF" stroke-opacity="0.12"/>
      <rect x="260" y="146" width="134" height="44" rx="8" fill="#0D1118" stroke="#B9D2FF" stroke-opacity="0.12"/>
      <rect x="24" y="204" width="370" height="34" rx="4" fill="#8B0000" fill-opacity="0.8"/>
      <text x="126" y="227" fill="#F9E9E4" font-family="Space Grotesk, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3">REGISTER AND ENTER</text>
    </g>

    <g transform="translate(1020 88)">
      <rect x="0" y="0" width="56" height="548" rx="8" fill="#131920" stroke="#F05A2A" stroke-opacity="0.45"/>
      <g fill="#B4CB8A" font-family="Space Grotesk, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">
        <text x="15" y="40">01</text>
        <text x="15" y="96">02</text>
        <text x="15" y="152">03</text>
        <text x="15" y="208">04</text>
        <text x="15" y="264">05</text>
        <text x="15" y="320">06</text>
      </g>
      <path d="M12 62H44M12 118H44M12 174H44M12 230H44M12 286H44M12 342H44" stroke="#B4CB8A" stroke-opacity="0.45" stroke-width="2"/>
    </g>

    <g transform="translate(40 620)">
      <path d="M0 0H1000" stroke="#8B0000" stroke-opacity="0.4" stroke-width="2"/>
      <text x="0" y="32" fill="#5D5340" font-family="Space Grotesk, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4">IMMEDIATE ENTRY DOES NOT APPLY. PROCESSING REQUIRED.</text>
    </g>
  </g>

  <g opacity="0.32">
    <rect x="1220" y="180" width="152" height="46" rx="6" fill="#F05A2A"/>
    <rect x="1188" y="244" width="184" height="34" rx="6" fill="#B4CB8A" fill-opacity="0.34"/>
    <rect x="1210" y="296" width="172" height="26" rx="6" fill="#D7E4FF" fill-opacity="0.14"/>
  </g>

  <rect width="1600" height="1000" fill="url(#grid)" opacity="0.26"/>
  <rect width="1600" height="1000" filter="url(#noise)" opacity="0.48"/>
  <rect width="1600" height="1000" fill="none" stroke="#121820" stroke-width="18"/>
</svg>
