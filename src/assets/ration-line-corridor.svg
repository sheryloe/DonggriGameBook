<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ration line corridor</title>
  <desc id="desc">A cramped interior corridor with ration queue markers, tape, shutter panels, and Korean shelter signage.</desc>
  <defs>
    <linearGradient id="bg" x1="800" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07090D"/>
      <stop offset="0.55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#030405"/>
    </linearGradient>
    <linearGradient id="floor" x1="800" y1="520" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#181C21"/>
      <stop offset="1" stop-color="#090B10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(805 360) rotate(90) scale(340 580)">
      <stop stop-color="#B4CB8A" stop-opacity="0.18"/>
      <stop offset="0.56" stop-color="#B4CB8A" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#B4CB8A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="tile" width="82" height="82" patternUnits="userSpaceOnUse">
      <rect width="82" height="82" fill="#11161C"/>
      <path d="M0 0H82V82H0V0Z" stroke="#3A434E" stroke-opacity="0.45" stroke-width="1"/>
      <path d="M41 0V82M0 41H82" stroke="#3A434E" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <g opacity="0.86">
    <rect x="88" y="120" width="324" height="660" fill="#0A0D12"/>
    <rect x="1188" y="120" width="324" height="660" fill="#0A0D12"/>
    <rect x="412" y="120" width="776" height="660" fill="url(#tile)"/>
  </g>

  <g opacity="0.7">
    <path d="M92 120H1508" stroke="#B9D2FF" stroke-opacity="0.14" stroke-width="2"/>
    <path d="M92 180H1508" stroke="#B9D2FF" stroke-opacity="0.06" stroke-width="1.5"/>
    <path d="M92 786H1508" stroke="#B9D2FF" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <g transform="translate(460 164)">
    <rect x="0" y="0" width="680" height="612" rx="18" fill="#0E1218" stroke="#2C3947" stroke-width="2"/>
    <rect x="20" y="20" width="640" height="572" rx="12" fill="#10151B" stroke="#3B4652" stroke-width="1.5"/>

    <g>
      <rect x="48" y="50" width="584" height="46" rx="8" fill="#121821"/>
      <text x="64" y="80" fill="#B4CB8A" font-family="Space Grotesk, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3">RATIONS / QUEUE / CORRIDOR 17</text>
    </g>

    <g opacity="0.92">
      <rect x="76" y="140" width="228" height="362" rx="8" fill="#D9CCB2"/>
      <rect x="326" y="140" width="228" height="362" rx="8" fill="#D9CCB2"/>
      <rect x="576" y="140" width="56" height="362" rx="8" fill="#10151B" stroke="#F05A2A" stroke-opacity="0.5"/>
    </g>

    <g transform="translate(104 168)">
      <rect x="0" y="0" width="172" height="60" rx="4" fill="#8B0000" fill-opacity="0.92"/>
      <text x="18" y="24" fill="#F9E9E4" font-family="Space Grotesk, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">QUEUE A</text>
      <text x="18" y="44" fill="#F9E9E4" font-family="Space Grotesk, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">TEMP ENTRY ONLY</text>
    </g>

    <g transform="translate(354 168)">
      <rect x="0" y="0" width="172" height="60" rx="4" fill="#597526" fill-opacity="0.94"/>
      <text x="18" y="24" fill="#EDF4DD" font-family="Space Grotesk, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">QUEUE B</text>
      <text x="18" y="44" fill="#EDF4DD" font-family="Space Grotesk, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2">RATION PICKUP</text>
    </g>

    <g opacity="0.85">
      <path d="M142 286H256" stroke="#6E5F4B" stroke-width="3"/>
      <path d="M142 322H256" stroke="#6E5F4B" stroke-width="3"/>
      <path d="M142 358H230" stroke="#6E5F4B" stroke-width="3"/>
      <path d="M392 286H506" stroke="#6E5F4B" stroke-width="3"/>
      <path d="M392 322H506" stroke="#6E5F4B" stroke-width="3"/>
      <path d="M392 358H480" stroke="#6E5F4B" stroke-width="3"/>
    </g>

    <g>
      <rect x="548" y="180" width="68" height="260" rx="8" fill="#10151B"/>
      <path d="M576 196V420" stroke="#F05A2A" stroke-width="3"/>
      <circle cx="576" cy="266" r="44" fill="#F05A2A" fill-opacity="0.1" stroke="#F05A2A" stroke-width="2"/>
      <text x="559" y="482" fill="#B4CB8A" font-family="Space Grotesk, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">SHUTTER</text>
    </g>
  </g>

  <g transform="translate(220 842)">
    <path d="M0 0H1160" stroke="#8B0000" stroke-opacity="0.42" stroke-width="2"/>
    <text x="0" y="32" fill="#D4C5A5" font-family="Space Grotesk, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="4">LINE UP IN SILENCE. THE CORRIDOR HEARS EVERYTHING.</text>
  </g>

  <g opacity="0.28">
    <rect x="140" y="204" width="144" height="34" rx="4" fill="#B4CB8A"/>
    <rect x="124" y="262" width="176" height="28" rx="4" fill="#D7E4FF" fill-opacity="0.18"/>
    <rect x="1288" y="214" width="140" height="34" rx="4" fill="#F05A2A"/>
    <rect x="1272" y="268" width="174" height="28" rx="4" fill="#D7E4FF" fill-opacity="0.16"/>
  </g>

  <rect width="1600" height="1000" filter="url(#noise)" opacity="0.48"/>
  <rect width="1600" height="1000" fill="none" stroke="#111720" stroke-width="18"/>
</svg>
