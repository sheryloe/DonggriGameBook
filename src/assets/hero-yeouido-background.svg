<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Yeouido survival background</title>
  <desc id="desc">A Korean post-apocalyptic cityscape with checkpoint lights, fog, concrete towers, and emergency signage.</desc>
  <defs>
    <linearGradient id="sky" x1="800" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070C"/>
      <stop offset="0.55" stop-color="#090D12"/>
      <stop offset="1" stop-color="#020406"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(820 380) rotate(90) scale(420 620)">
      <stop stop-color="#F05A2A" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#F05A2A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#F05A2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fog" x1="800" y1="540" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8D0D9" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#C8D0D9" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#C8D0D9" stop-opacity="0.03"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" stroke="#9EC6FF" stroke-opacity="0.09" stroke-width="1"/>
      <path d="M40 0V80M0 40H80" stroke="#9EC6FF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <g opacity="0.92">
    <path d="M0 720H1600V1000H0V720Z" fill="#050608"/>
    <path d="M120 600H460V1000H120V600Z" fill="#0A0D12"/>
    <path d="M420 420H700V1000H420V420Z" fill="#0C1016"/>
    <path d="M680 240H980V1000H680V240Z" fill="#070B10"/>
    <path d="M980 360H1240V1000H980V360Z" fill="#0E1218"/>
    <path d="M1210 500H1520V1000H1210V500Z" fill="#090C11"/>
  </g>

  <g opacity="0.22">
    <path d="M160 660H420" stroke="#C5D9FF" stroke-width="6"/>
    <path d="M478 520H640" stroke="#C5D9FF" stroke-width="5"/>
    <path d="M752 388H914" stroke="#C5D9FF" stroke-width="6"/>
    <path d="M1030 560H1198" stroke="#C5D9FF" stroke-width="5"/>
    <path d="M1300 700H1490" stroke="#C5D9FF" stroke-width="6"/>
  </g>

  <g opacity="0.9">
    <rect x="580" y="540" width="430" height="40" fill="#0D0F14"/>
    <rect x="630" y="500" width="340" height="54" fill="#10151B"/>
    <rect x="680" y="462" width="250" height="50" fill="#131922"/>
    <rect x="725" y="428" width="155" height="46" fill="#151C26"/>
    <rect x="755" y="394" width="92" height="40" fill="#171F2B"/>
    <path d="M590 580H1000" stroke="#2B3A4A" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M651 554H949" stroke="#2B3A4A" stroke-opacity="0.4" stroke-width="2"/>
    <path d="M701 522H879" stroke="#2B3A4A" stroke-opacity="0.4" stroke-width="2"/>
  </g>

  <g>
    <rect x="212" y="556" width="112" height="34" rx="4" fill="#F05A2A" fill-opacity="0.72"/>
    <rect x="248" y="510" width="12" height="96" fill="#D7E4FF" fill-opacity="0.35"/>
    <rect x="1220" y="468" width="150" height="34" rx="5" fill="#6FE1BB" fill-opacity="0.46"/>
    <rect x="1252" y="416" width="12" height="104" fill="#D7E4FF" fill-opacity="0.28"/>
    <rect x="110" y="712" width="1380" height="6" fill="#F05A2A" fill-opacity="0.5"/>
  </g>

  <g opacity="0.42">
    <path d="M160 760C310 718 380 700 520 702C670 704 760 732 900 730C1060 728 1180 690 1420 706" stroke="#C8D0D9" stroke-width="3" stroke-linecap="round"/>
    <path d="M100 806C278 786 374 780 542 786C718 792 798 824 970 820C1134 816 1232 768 1520 790" stroke="#C8D0D9" stroke-width="2" stroke-opacity="0.7" stroke-linecap="round"/>
  </g>

  <g opacity="0.28">
    <path d="M0 128C180 150 292 132 404 112C548 86 698 78 812 104C950 136 1092 160 1270 126C1408 98 1510 82 1600 94V0H0V128Z" fill="#F05A2A"/>
    <path d="M0 128C180 150 292 132 404 112C548 86 698 78 812 104C950 136 1092 160 1270 126C1408 98 1510 82 1600 94" stroke="#F05A2A" stroke-opacity="0.45" stroke-width="1.5"/>
  </g>

  <rect width="1600" height="1000" fill="url(#fog)"/>
  <rect width="1600" height="1000" filter="url(#noise)" opacity="0.45"/>
  <rect width="1600" height="1000" fill="none" stroke="#1B232D" stroke-width="18"/>
</svg>
