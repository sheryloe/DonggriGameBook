<svg width="1200" height="1600" viewBox="0 0 1200 1600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dossier portrait card</title>
  <desc id="desc">A black and white survivor dossier portrait with stamps, labels, and emergency file markings.</desc>
  <defs>
    <linearGradient id="card" x1="600" y1="0" x2="600" y2="1600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171717"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="skin" x1="600" y1="280" x2="600" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A99286"/>
      <stop offset="1" stop-color="#463A36"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F2E6D1"/>
      <stop offset="1" stop-color="#D9CBB5"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#C8B89A" fill-opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="1600" fill="url(#card)"/>
