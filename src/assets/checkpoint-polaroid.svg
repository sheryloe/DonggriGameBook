<svg width="1400" height="1200" viewBox="0 0 1400 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Checkpoint polaroid</title>
  <desc id="desc">A taped polaroid-style image of a narrow checkpoint alley with shuttered storefronts and warning barriers.</desc>
  <defs>
    <linearGradient id="paper" x1="700" y1="120" x2="700" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3E9D3"/>
      <stop offset="1" stop-color="#D3C2A5"/>
    </linearGradient>
    <linearGradient id="photo" x1="700" y1="280" x2="700" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17181C"/>
      <stop offset="0.6" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="hazard" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F05A2A"/>
      <stop offset="1" stop-color="#F6C94C"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.2"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="1200" fill="#07090C"/>
