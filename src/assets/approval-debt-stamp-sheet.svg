<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Approval and debt stamp sheet</title>
  <desc id="desc">A dossier-like sheet of approval, debt, and quarantine stamps for Korean survival bureaucracy.</desc>
  <defs>
    <linearGradient id="bg" x1="800" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080A0E"/>
      <stop offset="0.6" stop-color="#0E1218"/>
      <stop offset="1" stop-color="#040506"/>
    </linearGradient>
    <linearGradient id="paper" x1="340" y1="190" x2="1240" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0D3B7"/>
      <stop offset="1" stop-color="#C8B590"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" stroke="#D7E4FF" stroke-opacity="0.05" stroke-width="1"/>
      <path d="M32 0V64M0 32H64" stroke="#D7E4FF" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <g transform="translate(290 88)">
    <rect x="0" y="0" width="1020" height="824" rx="22" fill="#10141A" stroke="#2B3440" stroke-width="2"/>
    <rect x="34" y="34" width="952" height="756" rx="16" fill="url(#paper)"/>

    <g opacity="0.5">
      <path d="M86 120H448" stroke="#6F5E46" stroke-width="3"/>
      <path d="M86 158H366" stroke="#6F5E46" stroke-width="3"/>
      <path d="M86 196H514" stroke="#6F5E46" stroke-width="3"/>
      <path d="M86 234H320" stroke="#6F5E46" stroke-width="3"/>
      <path d="M86 272H486" stroke="#6F5E46" stroke-width="3"/>
    </g>

    <g>
      <rect x="84" y="54" width="310" height="36" rx="4" fill="#8B0000"/>
      <text x="104" y="78" fill="#F7E6DF" font-family="Space Grotesk, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">RETURN JUDGMENT SHEET</text>
    </g>

    <g transform="translate(86 334)">
      <rect x="0" y="0" width="246" height="246" rx="14" fill="#F2E5CB" stroke="#8E7A59" stroke-width="2"/>
      <circle cx="123" cy="123" r="80" fill="#0E1318" stroke="#7DF7C5" stroke-width="3"/>
      <circle cx="123" cy="123" r="48" fill="#7DF7C5" fill-opacity="0.14" stroke="#7DF7C5" stroke-width="2"/>
      <path d="M63 123H183M123 63V183" stroke="#7DF7C5" stroke-width="2" stroke-dasharray="8 6"/>
      <rect x="76" y="198" width="94" height="22" rx="4" fill="#597526"/>
      <text x="95" y="214" fill="#ECF5DF" font-family="Space Grotesk, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">N-CLEAR</text>
    </g>

    <g transform="translate(372 334)">
      <rect x="0" y="0" width="246" height="246" rx="14" fill="#F2E5CB" stroke="#8E7A59" stroke-width="2"/>
      <circle cx="123" cy="123" r="80" fill="#0E1318" stroke="#FFCF6E" stroke-width="3"/>
      <circle cx="123" cy="123" r="48" fill="#FFCF6E" fill-opacity="0.14" stroke="#FFCF6E" stroke-width="2"/>
      <path d="M63 123H183M123 63V183" stroke="#FFCF6E" stroke-width="2" stroke-dasharray="8 6"/>
      <rect x="74" y="198" width="98" height="22" rx="4" fill="#A67B18"/>
      <text x="93" y="214" fill="#FFF2CE" font-family="Space Grotesk, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">A-DEBT</text>
    </g>

    <g transform="translate(658 334)">
      <rect x="0" y="0" width="246" height="246" rx="14" fill="#F2E5CB" stroke="#8E7A59" stroke-width="2"/>
      <circle cx="123" cy="123" r="80" fill="#0E1318" stroke="#FF7A7A" stroke-width="3"/>
      <circle cx="123" cy="123" r="48" fill="#FF7A7A" fill-opacity="0.14" stroke="#FF7A7A" stroke-width="2"/>
      <path d="M63 123H183M123 63V183" stroke="#FF7A7A" stroke-width="2" stroke-dasharray="8 6"/>
      <rect x="72" y="198" width="102" height="22" rx="4" fill="#8B0000"/>
      <text x="92" y="214" fill="#FBE8E6" font-family="Space Grotesk, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">Q-HOLD</text>
    </g>

    <g transform="translate(84 614)">
      <rect x="0" y="0" width="820" height="120" rx="10" fill="#11161C" stroke="#313B47" stroke-width="2"/>
      <text x="22" y="36" fill="#B4CB8A" font-family="Space Grotesk, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3">STATUS NOTE</text>
      <text x="22" y="68" fill="#DFD4BE" font-family="Space Grotesk, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">APPROVAL IS NOT SAFETY. DEBT IS NOT A REFUSAL. HOLD IS NOT RELEASE.</text>
      <text x="22" y="94" fill="#DFD4BE" font-family="IBM Plex Sans KR, Arial, sans-serif" font-size="15">여의도는 결과를 세 칸으로 나눈다. 승인, 공제, 보류.</text>
    </g>
  </g>

  <g opacity="0.32">
    <rect x="1184" y="172" width="154" height="46" rx="6" fill="#7DF7C5"/>
    <rect x="1206" y="232" width="132" height="28" rx="6" fill="#FFCF6E"/>
    <rect x="1180" y="286" width="160" height="40" rx="6" fill="#FF7A7A"/>
  </g>

  <rect width="1600" height="1000" filter="url(#noise)" opacity="0.5"/>
  <rect width="1600" height="1000" fill="none" stroke="#111720" stroke-width="18"/>
</svg>
